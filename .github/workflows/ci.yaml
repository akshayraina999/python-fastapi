name: Python DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: 🔄 Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

    - name: 🐍 Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-python: '3.11'
        cache: 'pip'

    - name: 📦 Install Dependencies & Linters
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 🔍 Run Static Code Linting (Flake8)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # -------------------------------------------------------------------------
    # SONARQUBE INTEGRATION & QUALITY GATES SCAN
    # -------------------------------------------------------------------------
    - name: 🎯 SonarQube Code Quality Analysis
      uses: sonarsource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        args: >
          -Dsonar.projectKey=python-fastapi-poc
          -Dsonar.projectName=python-fastapi-poc
          -Dsonar.sources=app
          -Dsonar.language=py
          -Dsonar.python.version=3.11

    # This step will halt the pipeline if the code fails your set Quality Gates
    - name: 🛑 Enforce SonarQube Quality Gate
      uses: sonarsource/sonarqube-quality-gate-action@v1
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
